":"author_Jennifer Griffiths (MCIPD)","t":"Inclusion & Belonging","w":4},{"s":"author_Jennifer Griffiths (MCIPD)","t":"Productivity & Working Styles","w":3},{"s":"author_Katrina Cochrane","t":"Diagnosis & Disclosure","w":1},{"s":"author_Katrina Cochrane","t":"Productivity & Working Styles","w":1},{"s":"author_Jennifer Griffiths (MCIPD)","t":"Communication & Meetings","w":2},{"s":"author_Jennifer Griffiths (MCIPD)","t":"Assistive Technology","w":2},{"s":"author_Marcia Brissett-Bailey BSc, PG Dip (QCG), MA,IPSEA","t":"Inclusion & Belonging","w":1},{"s":"author_Dr. Victoria V.","t":"Communication & Meetings","w":1},{"s":"author_Dr. Victoria V.","t":"Inclusion & Belonging","w":2},{"s":"author_Marcia Brissett-Bailey BSc, PG Dip (QCG), MA,IPSEA","t":"Productivity & Working Styles","w":1},{"s":"author_Arran Smith","t":"Masking & Burnout","w":2},{"s":"author_Arran Smith","t":"Neurodivergent Leadership","w":1},{"s":"author_Arran Smith","t":"Inclusion & Belonging","w":3},{"s":"author_Arran Smith","t":"Productivity & Working Styles","w":2},{"s":"author_Arran Smith","t":"Assistive Technology","w":1},{"s":"author_Jennifer Griffiths (MCIPD)","t":"Workplace Adjustments","w":1},{"s":"author_Ronnie Cane","t":"Workplace Adjustments","w":1},{"s":"author_Ronnie Cane","t":"Diagnosis & Disclosure","w":1},{"s":"author_Ronnie Cane","t":"Inclusion & Belonging","w":2},{"s":"author_Ronnie Cane","t":"Productivity & Working Styles","w":1},{"s":"author_Chris Moore","t":"Masking & Burnout","w":1},{"s":"author_Chris Moore","t":"Productivity & Working Styles","w":1},{"s":"author_Chris Moore","t":"Assistive Technology","w":1},{"s":"author_Dr. Victoria V.","t":"Future of Work / Systems Change","w":1},{"s":"author_Kate Jenkinson PhD, FCIPD","t":"Inclusion & Belonging","w":1},{"s":"author_Mark Beggs (Msc In Business Administration)","t":"Neurodivergent Leadership","w":2},{"s":"author_Mark Beggs (Msc In Business Administration)","t":"Inclusion & Belonging","w":2}]};
const W=window.innerWidth,H=window.innerHeight;
const svg=d3.select("#network").attr("width",W).attr("height",H);
const defs=svg.append("defs");
const glow=defs.append("filter").attr("id","glow");
glow.append("feGaussianBlur").attr("stdDeviation",5).attr("result","blur");
const fm=glow.append("feMerge");fm.append("feMergeNode").attr("in","blur");fm.append("feMergeNode").attr("in","SourceGraphic");
const g=svg.append("g");
svg.call(d3.zoom().scaleExtent([.2,6]).on("zoom",e=>g.attr("transform",e.transform)));
const tooltip=d3.select("#tooltip");

// Expand compact data
const allNodes=RAW.n.map(n=>{
  if(n.tp==='t') return{id:n.id,type:'theme',posts:n.ps,engagement:n.eng,label:n.lb};
  if(n.tp==='a') return{id:n.id,type:'author',posts:n.ps,engagement:n.eng,label:n.lb,themeCount:n.tc};
  return{id:n.id,type:'post',engagement:n.eng,likes:n.lk,comments:n.cm,shares:n.sh,label:n.lb,fullText:n.ft,author:n.au,date:n.dt,url:n.url,themes:n.th};
});

const ptEdges=RAW.pt.map(e=>({source:e.s,target:e.t,type:'pt'}));
const paEdges=RAW.pa.map(e=>({source:e.s,target:e.t,type:'pa'}));
const teEdges=RAW.te.map(e=>({source:e.s,target:e.t,weight:e.w,type:'te'}));
const atEdges=RAW.at.map(e=>({source:e.s,target:e.t,weight:e.w,type:'at'}));

const themeR=d3.scaleSqrt().domain([0,d3.max(allNodes.filter(n=>n.type==='theme'),n=>n.engagement)]).range([24,58]);
const authorR=d3.scaleSqrt().domain([0,d3.max(allNodes.filter(n=>n.type==='author'),n=>n.engagement)]).range([6,20]);
const postR=d3.scaleSqrt().domain([0,d3.max(allNodes.filter(n=>n.type==='post'),n=>n.engagement)]).range([2.5,10]);

// Active theme filters
let activeThemes=new Set(Object.keys(TC));

// Build theme filter panel
const fp=d3.select("#theme-filters");
Object.entries(TC).forEach(([name,color])=>{
  const item=fp.append("div").attr("class","filter-item active").on("click",function(){
    const el=d3.select(this);
    if(el.classed("active")){activeThemes.delete(name);el.classed("active",false)}
    else{activeThemes.add(name);el.classed("active",true)}
    renderNetwork(currentMode);
  });
  item.append("div").attr("class","filter-dot").style("background",color);
  item.append("span").text(name);
});

let currentMode="full",simulation;

function getPostPrimaryTheme(p){
  if(!p.themes||!p.themes.length) return null;
  return p.themes[0];
}

function renderNetwork(mode){
  currentMode=mode;
  g.selectAll("*").remove();
  if(simulation) simulation.stop();
  d3.selectAll(".mode-btn").classed("active",false);
  d3.selectAll(".mode-btn").each(function(){if(d3.select(this).attr("data-mode")===mode) d3.select(this).classed("active",true)});

  let nodes=[],links=[];
  const themes=allNodes.filter(n=>n.type==='theme'&&activeThemes.has(n.id));
  const authors=allNodes.filter(n=>n.type==='author');
  const posts=allNodes.filter(n=>n.type==='post'&&n.themes&&n.themes.some(t=>activeThemes.has(t)));

  if(mode==='themes'){
    nodes=themes.map(n=>({...n}));
    links=teEdges.filter(e=>activeThemes.has(e.source)&&activeThemes.has(e.target)).map(e=>({...e}));
  } else if(mode==='authors'){
    nodes=[...themes,...authors].map(n=>({...n}));
    links=[...teEdges.filter(e=>activeThemes.has(e.source)&&activeThemes.has(e.target)),...atEdges.filter(e=>activeThemes.has(e.target))].map(e=>({...e}));
  } else if(mode==='posts'){
    nodes=[...themes,...posts].map(n=>({...n}));
    links=ptEdges.filter(e=>{
      const p=posts.find(p=>p.id===e.source);
      return p&&activeThemes.has(e.target);
    }).map(e=>({...e}));
  } else { // full
    nodes=[...themes,...authors,...posts].map(n=>({...n}));
    links=[
      ...ptEdges.filter(e=>{const p=posts.find(p=>p.id===e.source);return p&&activeThemes.has(e.target)}),
      ...paEdges.filter(e=>posts.find(p=>p.id===e.source)),
    ].map(e=>({...e}));
  }

  const linkOpBase=mode==='themes'?.35:mode==='authors'?.15:.06;

  simulation=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>{
      if(d.type==='te') return 160-d.weight*1.5;
      if(d.type==='at') return 100;
      if(d.type==='pa') return 30;
      return 60;
    }).strength(d=>{
      if(d.type==='te') return .08+d.weight*.003;
      if(d.type==='at') return .06;
      if(d.type==='pa') return .15;
      return .04;
    }))
    .force("charge",d3.forceManyBody().strength(d=>{
      if(d.type==='theme') return mode==='full'?-800:-500;
      if(d.type==='author') return -200;
      return -15;
    }))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collision",d3.forceCollide().radius(d=>{
      if(d.type==='theme') return themeR(d.engagement)+8;
      if(d.type==='author') return authorR(d.engagement)+5;
      return postR(d.engagement)+2;
    }))
    .alphaDecay(.02);

  // Links
  const link=g.append("g").selectAll("line").data(links).join("line")
    .attr("stroke",d=>{
      if(d.type==='te'||d.type==='at'){
        const t=typeof d.target==='object'?d.target.id:d.target;
        return TC[t]||"#1e293b";
      }
      const t=typeof d.target==='object'?d.target.id:d.target;
      return TC[t]||"#1e293b";
    })
    .attr("stroke-width",d=>d.type==='te'?Math.max(1,d.weight*.15):d.type==='at'?1:.4)
    .attr("stroke-opacity",d=>d.type==='te'?linkOpBase:d.type==='at'?linkOpBase*.8:linkOpBase*.5);

  // Post nodes
  const postNode=g.append("g").selectAll("circle").data(nodes.filter(d=>d.type==='post')).join("circle")
    .attr("r",d=>postR(d.engagement))
    .attr("fill",d=>{const t=getPostPrimaryTheme(d);return t?TC[t]:"#334155"})
    .attr("fill-opacity",.5)
    .attr("stroke",d=>{const t=getPostPrimaryTheme(d);return t?TC[t]:"#475569"})
    .attr("stroke-width",.5)
    .attr("stroke-opacity",.4)
    .style("cursor","pointer")
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));

  // Author nodes
  const authorNode=g.append("g").selectAll("g").data(nodes.filter(d=>d.type==='author')).join("g")
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));
  authorNode.append("circle").attr("r",d=>authorR(d.engagement)).attr("fill","#1e293b").attr("stroke","#94a3b8").attr("stroke-width",1.2).attr("stroke-opacity",.6);
  authorNode.append("text").text(d=>{const p=d.label.split(' ');return p.length>2?p[0]+' '+p[1]:d.label}).attr("text-anchor","middle").attr("dy",d=>-authorR(d.engagement)-5).attr("font-family","'DM Sans',sans-serif").attr("font-size","8px").attr("fill","#94a3b8").attr("fill-opacity",.7);

  // Theme nodes
  const themeNode=g.append("g").selectAll("g").data(nodes.filter(d=>d.type==='theme')).join("g")
    .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));
  themeNode.append("circle").attr("r",d=>themeR(d.engagement)).attr("fill",d=>TC[d.id]||"#5eead4").attr("fill-opacity",.12).attr("stroke",d=>TC[d.id]||"#5eead4").attr("stroke-width",1.8).attr("stroke-opacity",.6).attr("filter","url(#glow)");
  themeNode.append("text").text(d=>d.label).attr("text-anchor","middle").attr("dy",0).attr("font-family","'Space Mono',monospace").attr("font-size",d=>themeR(d.engagement)>35?"10px":"9px").attr("fill",d=>TC[d.id]||"#5eead4").attr("letter-spacing",".5px").attr("font-weight",700);
  themeNode.append("text").text(d=>d.posts+" posts").attr("text-anchor","middle").attr("dy",14).attr("font-family","'DM Sans',sans-serif").attr("font-size","8px").attr("fill","#64748b");

  // Hover interactions
  const allInteractive=g.selectAll("circle,g");

  function highlight(event,d){
    const connected=new Set([d.id]);
    links.forEach(l=>{
      const sid=typeof l.source==='object'?l.source.id:l.source;
      const tid=typeof l.target==='object'?l.target.id:l.target;
      if(sid===d.id) connected.add(tid);
      if(tid===d.id) connected.add(sid);
    });
    postNode.style("opacity",n=>connected.has(n.id)?.9:.04);
    authorNode.style("opacity",n=>connected.has(n.id)?1:.08);
    themeNode.style("opacity",n=>connected.has(n.id)?1:.08);
    link.style("opacity",l=>{
      const sid=typeof l.source==='object'?l.source.id:l.source;
      const tid=typeof l.target==='object'?l.target.id:l.target;
      return(sid===d.id||tid===d.id)?.5:.01;
    });

    let html='';
    if(d.type==='post'){
      html=`<div class="tt-name" style="color:${TC[getPostPrimaryTheme(d)]||'#94a3b8'}">${d.author}</div>`;
      html+=`<div class="tt-stat" style="margin-bottom:6px">${d.date}</div>`;
      html+=`<div style="color:#c8cdd8;font-size:11px;line-height:1.5;margin-bottom:6px">${d.fullText}</div>`;
      html+=`<div class="tt-stat">👍 <span>${d.likes}</span> &nbsp;💬 <span>${d.comments}</span> &nbsp;🔁 <span>${d.shares}</span></div>`;
      if(d.themes&&d.themes.length){
        html+='<div class="tt-themes">';
        d.themes.forEach(t=>{html+=`<span class="tt-tag" style="background:${TC[t]||'#334155'}22;color:${TC[t]||'#94a3b8'}">${t}</span>`});
        html+='</div>';
      }
    } else if(d.type==='author'){
      html=`<div class="tt-name" style="color:#94a3b8">${d.label}</div>`;
      html+=`<div class="tt-stat"><span>${d.posts}</span> relevant posts</div>`;
      html+=`<div class="tt-stat"><span>${d.engagement.toLocaleString()}</span> total engagement</div>`;
      html+=`<div class="tt-stat">Spans <span>${d.themeCount}</span> themes</div>`;
    } else {
      html=`<div class="tt-name" style="color:${TC[d.id]||'#5eead4'}">${d.label}</div>`;
      html+=`<div class="tt-stat"><span>${d.posts}</span> posts</div>`;
      html+=`<div class="tt-stat"><span>${d.engagement.toLocaleString()}</span> total engagement</div>`;
      html+=`<div class="tt-stat">Avg: <span>${Math.round(d.engagement/d.posts)}</span> per post</div>`;
    }
    tooltip.html(html).style("opacity",1);
  }

  function moveTooltip(event){
    let x=event.clientX+16,y=event.clientY-10;
    if(x+360>W) x=event.clientX-376;
    if(y+200>H) y=H-210;
    tooltip.style("left",x+"px").style("top",y+"px");
  }

  function unhighlight(){
    tooltip.style("opacity",0);
    postNode.style("opacity",.5);
    authorNode.style("opacity",1);
    themeNode.style("opacity",1);
    link.style("opacity",d=>d.type==='te'?linkOpBase:d.type==='at'?linkOpBase*.8:linkOpBase*.5);
  }

  postNode.on("mouseover",highlight).on("mousemove",moveTooltip).on("mouseout",unhighlight)
    .on("click",(e,d)=>{if(d.url) window.open(d.url,'_blank')});
  authorNode.on("mouseover",(e,d)=>highlight(e,d)).on("mousemove",moveTooltip).on("mouseout",unhighlight);
  themeNode.on("mouseover",(e,d)=>highlight(e,d)).on("mousemove",moveTooltip).on("mouseout",unhighlight);

  simulation.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    postNode.attr("cx",d=>d.x).attr("cy",d=>d.y);
    authorNode.attr("transform",d=>`translate(${d.x},${d.y})`);
    themeNode.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

  // Legend
  const legend=d3.select("#legend");legend.html("");
  if(mode!=='themes'){
    legend.append("div").attr("class","leg-item").html(`<div class="leg-dot" style="background:#5eead4;opacity:.5"></div><span>Theme hub</span>`);
    if(mode==='full'||mode==='authors') legend.append("div").attr("class","leg-item").html(`<div class="leg-dot" style="background:#94a3b8;border:1px solid #94a3b8"></div><span>Author</span>`);
    if(mode==='full'||mode==='posts') legend.append("div").attr("class","leg-item").html(`<div class="leg-dot" style="background:#f59e0b;opacity:.5"></div><span>Post (coloured by primary theme)</span>`);
    legend.append("div").style("margin-top","6px").style("color","#334155").style("font-size","9px").text("Node size = engagement · Click posts to open");
  } else {
    Object.entries(TC).filter(([k])=>activeThemes.has(k)).forEach(([name,color])=>{
      legend.append("div").attr("class","leg-item").html(`<div class="leg-dot" style="background:${color}"></div>${name}`);
    });
  }
}

document.querySelectorAll(".mode-btn").forEach(btn=>{btn.addEventListener("click",()=>renderNetwork(btn.dataset.mode))});
renderNetwork("full");
window.addEventListener("resize",()=>{const w=window.innerWidth,h=window.innerHeight;svg.attr("width",w).attr("height",h)});
</script>
